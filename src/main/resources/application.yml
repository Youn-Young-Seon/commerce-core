spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/commerce
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  batch:
    jdbc:
      initialize-schema: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
