services:
  postgres:
    image: postgres:16
    container_name: commerce-postgres
    environment:
      POSTGRES_DB: commerce
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: commerce-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
